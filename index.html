<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TeleBox API Real Test</title>
<style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#08101f;color:#eef5ff}body{margin:0;padding:18px}.wrap{max-width:860px;margin:auto}.card{background:linear-gradient(180deg,#17243f,#101827);border:1px solid #2d4169;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 18px 50px #0006}h1{font-size:28px;margin:0 0 8px}.muted{color:#aab7d5;line-height:1.45}button{border:0;border-radius:16px;padding:14px 16px;font-weight:800;background:#60d9ff;color:#03111d;margin:6px 6px 6px 0;font-size:15px}input{width:100%;box-sizing:border-box;background:#071225;color:#fff;border:1px solid #2d4169;border-radius:14px;padding:14px;margin:8px 0;font-size:16px}pre{white-space:pre-wrap;word-break:break-word;background:#020815;border:1px solid #263a62;border-radius:16px;padding:14px;min-height:160px}.ok{color:#7dffae}.bad{color:#ff8ea1}</style>
</head>
<body><div class="wrap">
<div class="card"><h1>TeleBox API Real Test</h1><div class="muted">Bản này chỉ test API thật. Nếu trang này hiện được trên Vercel thì route gốc đã đúng. Bấm test để xem TeleBox trả gì.</div></div>
<div class="card">
<label>Folder ID cần test</label><input id="pid" value="0" />
<label>Tên folder test</label><input id="name" value="test123" />
<button onclick="run('all')">🧪 Test tổng hợp</button>
<button onclick="run('root')">📁 Folder details</button>
<button onclick="run('search')">🔎 File search</button>
<button onclick="run('create')">➕ Tạo folder test</button>
<div id="status" class="muted">Chưa chạy test.</div>
</div>
<div class="card"><pre id="out">Log sẽ hiện ở đây.</pre></div>
</div>
<script>
async function run(action){
  const pid=document.getElementById('pid').value.trim()||'0';
  const name=document.getElementById('name').value.trim()||('test_'+Date.now());
  const out=document.getElementById('out');
  const st=document.getElementById('status');
  st.textContent='Đang gọi /api/test...'; out.textContent='Loading...';
  try{
    const r=await fetch(`/api/test?action=${encodeURIComponent(action)}&pid=${encodeURIComponent(pid)}&name=${encodeURIComponent(name)}`,{cache:'no-store'});
    const text=await r.text();
    st.innerHTML=r.ok?'<span class="ok">HTTP '+r.status+'</span>':'<span class="bad">HTTP '+r.status+'</span>';
    try{ out.textContent=JSON.stringify(JSON.parse(text),null,2); }catch{ out.textContent=text; }
  }catch(e){ st.innerHTML='<span class="bad">Fetch lỗi</span>'; out.textContent=String(e); }
}
</script></body></html>
