<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TeleBox Drive Easy</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">TeleBox Drive</p>
        <h1>Kho lưu trữ dễ dùng</h1>
        <p class="sub">Chọn thư mục, upload ảnh/file, tạo thư mục và chia sẻ chỉ bằng vài nút bấm.</p>
      </div>
      <button id="refreshBtn" class="round" title="Tải lại">↻</button>
    </header>

    <section class="card current">
      <div class="row between">
        <div>
          <span class="label">Đang ở thư mục</span>
          <h2 id="currentFolderName">📁 Root</h2>
        </div>
        <button id="goRootBtn" class="ghost">Root</button>
      </div>
      <div id="crumbs" class="crumbs"></div>
    </section>

    <section class="card">
      <h2>⬆️ Upload file</h2>
      <form id="uploadForm" class="stack">
        <label class="label">Lưu vào thư mục</label>
        <select name="pid" id="uploadFolder"></select>
        <label class="filePick">
          <input type="file" name="files" id="fileInput" multiple />
          <span>📎 Chọn file / ảnh</span>
          <small id="fileText">Chưa chọn file nào</small>
        </label>
        <input name="diyName" placeholder="Tên lưu mới, bỏ trống để giữ tên gốc" />
        <button class="primary" type="submit">Upload ngay</button>
        <div id="uploadProgress" class="progress hidden"><div></div></div>
      </form>
    </section>

    <section class="card">
      <h2>📁 Tạo thư mục</h2>
      <form id="folderForm" class="stack">
        <label class="label">Tạo trong</label>
        <select name="pid" id="createFolderParent"></select>
        <input name="name" required placeholder="Ví dụ: Ảnh món ăn" />
        <button class="primary" type="submit">Tạo thư mục</button>
      </form>
    </section>

    <section class="card">
      <div class="row between">
        <h2>🗂️ File & thư mục</h2>
        <button id="openCurrentBtn" class="ghost">Tải lại</button>
      </div>
      <form id="searchForm" class="search">
        <input name="name" placeholder="Tìm ảnh, file, folder..." />
        <button type="submit">Tìm</button>
      </form>
      <div id="items" class="items"></div>
    </section>

    <section class="card logCard">
      <h2>📋 Trạng thái</h2>
      <pre id="log">Sẵn sàng.</pre>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
