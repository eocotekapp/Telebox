<!doctype html><html lang="vi"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TeleBox API Share Test</title>
<style>:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#08101f;color:#eef5ff}body{margin:0;padding:18px}.wrap{max-width:920px;margin:auto}.card{background:linear-gradient(180deg,#17243f,#101827);border:1px solid #2d4169;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 18px 50px #0006}h1{font-size:28px;margin:0 0 8px}.muted{color:#aab7d5;line-height:1.45}button{border:0;border-radius:16px;padding:14px 16px;font-weight:800;background:#60d9ff;color:#03111d;margin:6px 6px 6px 0;font-size:15px}.green{background:#61f29a}.orange{background:#ffd36a}input,select{width:100%;box-sizing:border-box;background:#071225;color:#fff;border:1px solid #2d4169;border-radius:14px;padding:14px;margin:8px 0 12px;font-size:16px}pre{white-space:pre-wrap;word-break:break-word;background:#020815;border:1px solid #263a62;border-radius:16px;padding:14px;min-height:180px}.ok{color:#7dffae}.bad{color:#ff8ea1}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card"><h1>TeleBox API Share Test</h1><div class="muted">Bản này thêm test <b>file_share</b>. Dán ID file rồi bấm tạo share hoặc tạo share + quét trang share để tìm direct/CDN URL.</div></div>
<div class="card"><div class="grid"><div><label>Folder ID để lấy danh sách</label><input id="pid" value="0"></div><div><label>Tên folder test</label><input id="name" value="test123"></div></div><button onclick="run('search')">🔎 File search</button><button onclick="run('all')">🧪 Test tổng hợp</button><button onclick="run('create')">➕ Tạo folder</button><div id="status" class="muted">Chưa chạy.</div></div>
<div class="card"><h2>Test share file</h2><div class="muted">Lấy <b>id</b> trong danh sách file, ví dụ <code>425831</code>, dán vào đây. Không dùng <code>item_id</code> dạng <code>fp...</code> cho endpoint share.</div><div class="grid"><div><label>File ID / itemIds</label><input id="itemId" placeholder="VD: 425831"></div><div><label>Thời hạn share</label><select id="expire"><option value="4">Vĩnh viễn</option><option value="3">30 ngày</option><option value="2">7 ngày</option><option value="1">24 giờ</option></select></div></div><button class="green" onclick="run('share')">🔗 Test API share file</button><button class="orange" onclick="run('shareAndProbe')">🧲 Share + quét direct URL</button><label>ShareToken nếu đã có</label><input id="shareToken" placeholder="VD: YNpN123"><button onclick="run('probeShare')">🕵️ Quét trang share bằng shareToken</button></div>
<div class="card"><pre id="out">Log sẽ hiện ở đây.</pre></div>
</div><script>
async function run(action){
 const qs=new URLSearchParams(); qs.set('action',action); qs.set('pid',document.getElementById('pid').value.trim()||'0'); qs.set('name',document.getElementById('name').value.trim()||('test_'+Date.now())); qs.set('itemId',document.getElementById('itemId').value.trim()); qs.set('expire',document.getElementById('expire').value); qs.set('shareToken',document.getElementById('shareToken').value.trim());
 const out=document.getElementById('out'), st=document.getElementById('status'); st.textContent='Đang gọi /api/test...'; out.textContent='Loading...';
 try{ const r=await fetch('/api/test?'+qs.toString(),{cache:'no-store'}); const text=await r.text(); st.innerHTML=r.ok?'<span class="ok">HTTP '+r.status+'</span>':'<span class="bad">HTTP '+r.status+'</span>'; try{ const json=JSON.parse(text); out.textContent=JSON.stringify(json,null,2); const token=json?.results?.find(x=>x.shareToken)?.shareToken || json?.results?.[0]?.body?.data?.shareToken; if(token) document.getElementById('shareToken').value=token; }catch{out.textContent=text;} }catch(e){ st.innerHTML='<span class="bad">Fetch lỗi</span>'; out.textContent=String(e); }
}
</script></body></html>
